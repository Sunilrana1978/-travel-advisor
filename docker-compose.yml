version: "3.9"
services:
  backend:
    build: .
    ports: ["8080:8080"]
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    ports: ["3000:8080"]
    depends_on:
      backend:
        condition: service_healthy
